server.port=8080

# Path to the unzipped FHIR NDJSON directory.
# Update this to the absolute path on your machine, or set the environment variable:
#   export FHIR_DATA_DIR=/path/to/sample-bulk-fhir-datasets-1000-patients
fhir.data.directory=${FHIR_DATA_DIR:/Users/victorchek/Desktop/github/autonomy_health_assessment/sample-bulk-fhir-datasets-1000-patients}

# Anthropic API key for Part D AI-assisted review.
# Set the environment variable before starting the backend:
#   export ANTHROPIC_API_KEY=sk-ant-...
# If unset, the /api/patients/{id}/ai-review endpoint returns 503.
anthropic.api.key=${ANTHROPIC_API_KEY:}
